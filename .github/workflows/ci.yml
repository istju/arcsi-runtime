name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Check JS syntax
        run: |
          node --check serverem.js
          node --check tools/toolRegistry.js
          node --check utils/providerUtils.js
          node --check utils/i18n.js
          node --check routes/mainRoutes.js

      - name: Verify locale files
        run: |
          node -e "JSON.parse(require('fs').readFileSync('locales/en.json','utf8')); console.log('en.json OK')"
          node -e "JSON.parse(require('fs').readFileSync('locales/hu.json','utf8')); console.log('hu.json OK')"
