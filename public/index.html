<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chat Pro v2</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="title">🤖 AI Chat Pro v2</div>
    <div class="provider" id="providerInfo">Betöltés...</div>
  </header>

  <main>
    <section id="chat"></section>

    <section id="inputArea">
      <textarea id="prompt" placeholder="Kérdezz bármit... (Shift+Enter: új sor)"></textarea>

      <div id="imgPreview" class="hidden">
        <button id="removeImg" title="Kép eltávolítása">✕</button>
        <img id="previewImg" src="" alt="előnézet">
      </div>

      <div class="bottom-row">
  <div class="btn-row-top">
    <button id="imgBtn" title="Kép feltöltése">🖼️</button>
    <button id="clearBtn" title="Beszélgetés törlése">🧹</button>
    <button id="agentBtn" title="Agent mód" class="agent-off">🤖 Agent</button>
    <button id="resetBtn" title="Új feladat - session törlése" class="reset-btn">🔄 Új feladat</button>
    <button id="saveProgressBtn" title="Kontextus mentése" class="save-btn">💾 Mentés</button>
    <button id="focusBtn" title="Aktuális fókusz beállítása" class="focus-btn">🎯 Fókusz</button>
  </div>
  <button id="send">KÜLDÉS</button>
</div>

      <input type="file" id="fileInput" accept="image/*" class="hidden">
      <div id="status"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
marked.setOptions({
  highlight: function(code, lang) { return code; },
  langPrefix: 'language-'
});
</script>

  <script src="app.js"></script>
</body>
</html>
